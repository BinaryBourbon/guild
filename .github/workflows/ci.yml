name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: guild
          POSTGRES_PASSWORD: guild
          POSTGRES_DB: guild_test
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://guild:guild@localhost:5432/guild_test
      # Placeholder values — real secrets are in GitHub Actions secrets
      GUILD_WORKER_GITHUB_TOKEN: placeholder-not-used-in-tests
      ANTHROPIC_API_KEY: placeholder-not-used-in-tests
      GUILD_WORKER_ID: placeholder-worker-id
      GUILD_REPO: BinaryBourbon/guild

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v

      - name: Test downgrade
        run: alembic downgrade base
