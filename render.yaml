databases:
  - name: guild-db
    plan: free
    databaseName: guild
    user: guild

services:
  - type: worker
    name: guild-worker
    plan: starter
    runtime: python
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && guild
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: guild-db
          property: connectionString
      - key: GUILD_WORKER_GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GUILD_WORKER_ID
        value: "guild-worker-mvp"
      - key: GUILD_REPO
        value: "BinaryBourbon/guild"
      - key: GUILD_POLL_INTERVAL_SECONDS
        value: "120"
      - key: GUILD_CLAIM_INTERVAL_SECONDS
        value: "300"
